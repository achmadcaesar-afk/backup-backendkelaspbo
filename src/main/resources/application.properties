spring.application.name=backend

# H2 Console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Datasource
spring.datasource.url=jdbc:h2:mem:lawnmowerdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Server port
server.port=8080

# JWT — nilai default untuk development lokal
# Di production (Vercel), set environment variable JWT_SECRET dengan nilai yang kuat
jwt.secret=${JWT_SECRET:local-dev-secret-key-minimum-32-chars-long}
jwt.expiration-ms=86400000
